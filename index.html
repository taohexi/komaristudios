 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Komari Studios — Mindful Art, Design &amp; Storytelling</title>
  <meta name="description" content="An independent creative studio focused on mindful art, design, and storytelling. Original artwork, custom illustration, and commissioned pieces.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://googleapis.com">
  <link rel="preconnect" href="https://gstatic.com" crossorigin>
  <link href="https://googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ─── CUSTOM FONT ─── */
    @font-face {
      font-family: 'Ounen-mouhitsu';
      src: url('Ounen-mouhitsu.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #FAF6F1;
      --bg-warm: #F5EDE3;
      --text-primary: #2C2420;
      --text-secondary: #6B5D52;
      --text-light: #9A8B7E;
      --accent-terracotta: #D4714E;
      --accent-sage: #7BA768;
      --accent-indigo: #5B6AAF;
      --accent-gold: #D4A843;
      --accent-rose: #C97B84;
      --gallery-bg: #F0EAE0;
      --gallery-card: #FDFBF8;
      --border: #E2D9CE;
      --border-light: #EDE7DE;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; font-size: 16px; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text-primary);
      line-height: 1.7;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── NAV ─── */

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 0.85rem 2.5rem;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(250, 246, 241, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-light);
      transition: background 0.3s ease;
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem; font-weight: 500;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text-primary); text-decoration: none;
      display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0;
    }

    .nav-logo-icon { width: 28px; height: 28px; }

    .nav-logo .letter-k, .hero-logotype .letter-k { color: #C9593A; }
    .nav-logo .letter-o, .hero-logotype .letter-o { color: #D4874E; }
    .nav-logo .letter-m, .hero-logotype .letter-m { color: #D4A843; }
    .nav-logo .letter-a, .hero-logotype .letter-a { color: #7BA768; }
    .nav-logo .letter-r, .hero-logotype .letter-r { color: #5B8EAF; }
    .nav-logo .letter-i, .hero-logotype .letter-i { color: #5B6AAF; }

    .nav-links { display: flex; gap: 2rem; list-style: none; flex-shrink: 0; }

    .nav-links a {
      font-size: 0.8rem; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-secondary); text-decoration: none; transition: color 0.25s ease;
    }
    .nav-links a:hover { color: var(--accent-terracotta); }

    /* ─── HERO ─── */

    .hero {
      min-height: 100vh; display: flex; flex-direction: column;
      justify-content: center; align-items: center; text-align: center;
      padding: 6rem 2rem 4rem; position: relative; overflow: hidden;
    }

    .hero-logotype {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.2rem, 5vw, 3.6rem); font-weight: 300;
      letter-spacing: 0.35em; text-transform: uppercase;
      margin-bottom: 1.5rem; color: var(--text-primary);
    }

    /* ─── STORY SECTION (THE IMAGE FIX) ─── */

    .story-section {
      position: relative;
      overflow: hidden;
      width: 100%;
      padding: 6rem 2rem;
      text-align: center;
      color: var(--text-primary);
      background: var(--bg);
    }

    .story-section::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 20px;
      transform: translateY(-50%);
      width: 100%;
      height: 100%;
      
      background-image: url('Playing_Temari.jpg');
      background-size: auto;      /* ORIGINAL SIZE */
      background-repeat: no-repeat;
      background-position: left center;
      opacity: 0.2;                /* 20% TRANSPARENCY */
      pointer-events: none;
      z-index: 0;
    }

    .section-inner {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
    }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.6rem, 3vw, 2.2rem); font-weight: 400;
      color: var(--text-primary); margin-bottom: 1.5rem; line-height: 1.3;
    }

    .section-body {
      color: var(--text-secondary); font-size: 0.95rem;
      max-width: 600px; line-height: 1.8; margin: 0 auto;
    }

  </style>
</head>
<body>

  <nav>
    <a href="#" class="nav-logo">
      <span class="letter-k">K</span>
      <span class="letter-o">O</span>
      <span class="letter-m">M</span>
      <span class="letter-a">A</span>
      <span class="letter-r">R</span>
      <span class="letter-i">I</span>
      STUDIOS
    </a>
    <ul class="nav-links">
      <li><a href="#story">Story</a></li>
      <li><a href="#work">Work</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <section class="hero">
    <div class="hero-brand">
      <h1 class="hero-logotype">
        <span class="letter-k">K</span>
        <span class="letter-o">O</span>
        <span class="letter-m">M</span>
        <span class="letter-a">A</span>
        <span class="letter-r">R</span>
        <span class="letter-i">I</span>
      </h1>
      <p class="hero-studio">Studios</p>
      <p class="hero-vision">Mindful art, design, and storytelling inspired by the beauty of the everyday.</p>
    </div>
  </section>

  <section id="story" class="story-section">
    <div class="section-inner">
      <h2 class="section-title">Our Story</h2>
      <div class="section-body">
        <p>Creating space for mindfulness through visual expression. We focus on the intersection of traditional inspiration and modern design.</p>
      </div>
    </div>
  </section>

</body>
</html>
